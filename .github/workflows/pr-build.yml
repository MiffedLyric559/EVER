name: PR Build Check

on:
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build (Release)
    runs-on: windows-2022

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up vcpkg binary cache credentials
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: vcpkg_installed
          key: vcpkg-x64-windows-release-${{ hashFiles('vcpkg.json') }}-${{ hashFiles('vcpkg/versions/baseline.json') }}
          restore-keys: |
            vcpkg-x64-windows-release-${{ hashFiles('vcpkg.json') }}-
            vcpkg-x64-windows-release-

      - name: Unshallow vcpkg submodule
        shell: cmd
        run: git -C vcpkg fetch --unshallow

      - name: Build
        shell: cmd
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
          VCPKG_OVERLAY_TRIPLETS: triplets
        run: .\build.bat