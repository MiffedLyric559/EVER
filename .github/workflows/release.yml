name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Publish Release
    runs-on: windows-2022

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up vcpkg binary cache credentials
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Bootstrap vcpkg
        shell: cmd
        run: .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Configure CMake
        shell: cmd
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: >
          cmake -B build
          -A x64
          -T v142
          -G "Visual Studio 17 2022"
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE=vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        shell: cmd
        run: cmake --build build --config Release

      - name: Package release artifacts
        shell: pwsh
        run: |
          $tag      = "${{ github.ref_name }}"
          $staging  = "staging"
          $outDir   = "x64\Release"

          # Create clean staging area
          New-Item -ItemType Directory -Path $staging | Out-Null

          # Copy EVER.asi
          Copy-Item "$outDir\EVER.asi" "$staging\EVER.asi"

          # Copy EVER folder recursively
          Copy-Item "$outDir\EVER" "$staging\EVER" -Recurse

          # Remove debug symbols and map files that should not ship
          Get-ChildItem -Path $staging -Recurse -Include "*.pdb", "*.map" | Remove-Item -Force

          # Create the release zip
          $zipName = "EVER-$tag.zip"
          Compress-Archive -Path "$staging\*" -DestinationPath $zipName -Force
          Write-Host "Created $zipName"

      - name: Create GitHub release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          name: "EVER ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: "EVER-${{ github.ref_name }}.zip"
